# Workspace layout + a central `catalog:` so shared dependency versions live in ONE place
# (a single authoritative representation — DRY — and the only file to touch on a bump).
packages:
  - 'packages/*'
  - 'apps/*'

catalog:
  '@types/node': ^26.1.1
  '@vitest/coverage-v8': ^4.1.10
  fast-check: ^4.9.0
  tsup: ^8.5.1
  tsx: ^4.23.1
  typescript: ^7.0.2
  vitest: ^4.1.10
  zod: ^4.4.3
