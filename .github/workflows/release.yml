name: Release

# Changesets two-phase flow on every push to main:
#   1. changesets present  → open/refresh a "Version Packages" PR (bumps versions, writes CHANGELOGs)
#   2. that PR merges (changesets consumed) → `pnpm release` builds and publishes to npm
#
# Publishing is TOKENLESS via npm Trusted Publishing (OIDC): npm authenticates this workflow by its
# identity (repo + workflow filename), so there is no long-lived NPM_TOKEN to leak or expire. Every
# @aegiskit/* package must have a Trusted Publisher on npmjs.com → tomodahinata/aegis · release.yml.
on:
  push:
    branches: [main]

# Never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # commit version bumps, push tags, open the release PR
  pull-requests: write # the "Version Packages" PR
  id-token: write # npm Trusted Publishing (OIDC) — the sole publish credential; also signs provenance

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      # audit (not block): the publish step must reach the npm registry; egress is logged for review.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # changesets needs full history to compute the changelog

      # Shared pnpm + Node 24 + frozen install (see .github/actions/setup).
      - uses: ./.github/actions/setup

      # Trusted publishing needs npm CLI >= 11.5.1 for reliable OIDC auth; pin to latest regardless of the
      # npm bundled with Node. `changeset publish` shells out to this npm to perform the actual publish.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Create the Version Packages PR, or publish when it merges
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: authentication is npm Trusted Publishing (OIDC) via `id-token: write` above —
          # nothing to leak or expire. Provenance is generated automatically under trusted publishing
          # (npm attaches the signed attestation with no --provenance / NPM_CONFIG_PROVENANCE needed).

      # Software Bill of Materials for the version just published — a CycloneDX SBOM of the full (pnpm)
      # dependency tree, so an enterprise consumer can audit exactly what they pull in. Only on a real
      # publish; uploaded as a retained, downloadable artifact alongside the npm provenance above.
      - name: Generate CycloneDX SBOM
        if: steps.changesets.outputs.published == 'true'
        run: pnpm dlx @cyclonedx/cdxgen@11 --type pnpm --output sbom.cdx.json --no-recurse
      - name: Upload SBOM
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
