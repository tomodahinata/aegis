name: Scorecard

# OpenSSF Scorecard grades this repo's own supply-chain posture (pinned actions, token permissions,
# branch protection, dangerous workflows, …) and publishes the score so the README badge resolves.
# A security toolkit should be able to show its own homework.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 1"
  push:
    branches: [main]

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public OpenSSF API (enables the badge)
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
          category: scorecard
