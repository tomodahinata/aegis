# Shared toolchain for every CI job: pnpm + Node 24 + a frozen install. Extracted so the version
# pins and cache wiring live in ONE place (DRY) — jobs just `uses: ./.github/actions/setup` after
# checkout. harden-runner stays at the job level because it must run before checkout.
name: Setup pnpm + Node
description: Install pnpm, set up Node 24 with a pnpm store cache, and run a frozen install.

runs:
  using: composite
  steps:
    # pnpm before setup-node so setup-node's pnpm cache can resolve the store. The pnpm version comes
    # from the root package.json `packageManager` field — a single source of truth.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
