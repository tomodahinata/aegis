# Deterministic enforcement at the git boundary (the "must happen" lever).
pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{ts,tsx,js,jsx,json,jsonc}'
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm turbo run typecheck
    test:
      run: pnpm test

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
